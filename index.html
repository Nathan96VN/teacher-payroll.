<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lương Giáo Viên · Teacher Payroll</title>
<style>
  :root{
    --ink:#16202a; --ink-soft:#5a6b78; --line:#e4e9ed; --line-soft:#eef2f5;
    --paper:#ffffff; --canvas:#f6f8f9; --teal:#0d7a6f; --teal-soft:#e6f3f1;
    --gold:#c08a2d; --gold-soft:#f8efe0; --rose:#b3473f; --rose-soft:#f7e9e7;
    --radius:14px; --shadow:0 1px 3px rgba(20,32,42,.06),0 8px 24px rgba(20,32,42,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--canvas);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px;}
  h1,h2,h3{font-weight:600;letter-spacing:-.01em;line-height:1.2;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select{font-family:inherit;font-size:14px;width:100%;height:40px;padding:0 12px;
    border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);}
  input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft);}
  label.fl{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:5px;}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .brandlogo{width:42px;height:42px;border-radius:11px;background:var(--teal);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;overflow:hidden;flex-shrink:0;}
  .brandlogo img{width:100%;height:100%;object-fit:contain;background:#fff;}
  .brandname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brandsub{font-size:12px;color:var(--ink-soft);}
  .langtog{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex-shrink:0;background:var(--paper);}
  .langtog button{padding:8px 13px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .langtog button.on{background:var(--ink);color:#fff;}

  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card-pad{padding:20px;}
  .grid{display:grid;gap:14px;}
  @media(min-width:560px){.cols2{grid-template-columns:1fr 1fr;}.cols3{grid-template-columns:1fr 1fr 1fr;}}

  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
  .muted{color:var(--ink-soft);font-size:12px;}

  /* roster */
  .rosterhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line-soft);}
  .trow{display:flex;align-items:center;gap:13px;padding:14px 20px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .12s;}
  .trow:last-child{border-bottom:none;}
  .trow:hover{background:var(--canvas);}
  .tav{width:38px;height:38px;border-radius:50%;background:var(--teal-soft);color:var(--teal);
    display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
  .pill{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:.02em;}
  .pill-gold{background:var(--gold-soft);color:var(--gold);}
  .pill-teal{background:var(--teal-soft);color:var(--teal);}

  .btn{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border-radius:10px;
    font-size:14px;font-weight:600;transition:.12s;}
  .btn-primary{background:var(--teal);color:#fff;}
  .btn-primary:hover{background:#0a6359;}
  .btn-ghost{background:var(--paper);border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--ink-soft);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  .btn svg{width:16px;height:16px;}

  .back{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:16px;}
  .back svg{width:16px;height:16px;flex-shrink:0;} .back:hover{color:var(--ink);}

  .section-title{font-size:13px;font-weight:600;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}

  /* schedule table */
  .sched-h,.sched-r{display:grid;grid-template-columns:1.5fr .8fr .8fr 1.1fr 34px;gap:7px;align-items:center;}
  .sched-h{font-size:11px;color:var(--ink-soft);font-weight:500;padding:0 2px 7px;}
  .sched-r{margin-bottom:7px;}
  .sched-r input,.sched-r select{height:36px;font-size:13px;padding:0 8px;}
  .iconbtn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);border:1px solid var(--line);}
  .iconbtn:hover{color:var(--rose);border-color:var(--rose);}

  /* breakdown */
  .bd-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:14px;}
  .bd-row .lab{color:var(--ink-soft);}
  .bd-row .val{font-weight:600;font-variant-numeric:tabular-nums;}
  .bd-row.neg .val{color:var(--rose);}
  .bd-row.pos .val{color:var(--teal);}
  .bd-total{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:4px;}
  .bd-total .lab{font-size:15px;font-weight:600;}
  .bd-total .val{font-size:22px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;}

  .toggle-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row input{width:auto;height:auto;}
  .hint{font-size:11px;color:var(--ink-soft);margin-top:5px;line-height:1.45;}

  .disclaimer{background:var(--gold-soft);border:1px solid #ecd9b0;border-radius:11px;padding:13px 15px;font-size:12px;color:#7a5a1c;line-height:1.5;margin-top:18px;}
  .disclaimer b{color:#5e4415;}

  /* payslip */
  .slip{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .slip-head{padding:22px 24px;border-bottom:2px solid var(--ink);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
  .slip-logo{width:54px;height:54px;border-radius:11px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;overflow:hidden;flex-shrink:0;}
  .slip-logo img{width:100%;height:100%;object-fit:contain;background:#fff;}
  .slip-title{font-size:17px;font-weight:700;letter-spacing:-.01em;}
  .slip-title .vi{display:block;}
  .slip-title .en{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);letter-spacing:0;margin-top:1px;}
  .slip-period{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .slip-meta{padding:16px 24px;border-bottom:1px solid var(--line-soft);display:grid;gap:8px 20px;}
  @media(min-width:560px){.slip-meta{grid-template-columns:1fr 1fr;}}
  .meta-item{font-size:12.5px;}
  .meta-item .k{color:var(--ink-soft);}
  .meta-item .v{font-weight:600;}
  .slip-cols{display:grid;gap:0;}
  @media(min-width:560px){.slip-cols{grid-template-columns:1fr 1fr;}.slip-cols>div:first-child{border-right:1px solid var(--line-soft);}}
  .slip-colhead{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--teal);padding:14px 24px 8px;}
  .slip-line{display:flex;justify-content:space-between;gap:12px;padding:7px 24px;font-size:13px;}
  .slip-line .l{color:var(--ink-soft);}
  .slip-line .l .en{display:block;font-size:10.5px;opacity:.75;}
  .slip-line .a{font-weight:600;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
  .slip-line.sub{border-top:1px solid var(--line-soft);margin-top:4px;padding-top:10px;font-weight:700;}
  .slip-line.sub .l{color:var(--ink);font-weight:700;}
  .slip-net{background:var(--teal-soft);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
  .slip-net .l{font-size:13px;font-weight:700;color:var(--teal);}
  .slip-net .l .en{display:block;font-size:10.5px;font-weight:500;}
  .slip-net .a{font-size:22px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;}
  .slip-sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px;}
  .sign-box{text-align:center;font-size:12px;}
  .sign-box .role{font-weight:600;}
  .sign-box .sub{color:var(--ink-soft);font-size:10.5px;}
  .sign-box .line{margin-top:42px;border-top:1px solid var(--ink-soft);padding-top:5px;}
  .slip-foot{padding:13px 24px;border-top:1px solid var(--line-soft);font-size:10.5px;color:var(--ink-soft);line-height:1.5;}

  .hidden{display:none!important;}
  .add-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--teal);margin-top:8px;}

  /* weekly builder */
  .wk-h,.wk-r{display:grid;grid-template-columns:1.4fr .8fr .9fr .9fr 1.1fr 34px;gap:7px;align-items:center;}
  .wk-h{font-size:11px;color:var(--ink-soft);font-weight:500;padding:0 2px 8px;}
  .wk-r{margin-bottom:7px;}
  .wk-r input,.wk-r select{height:36px;font-size:13px;padding:0 8px;}
  /* timetable grid */
  .tt{display:grid;grid-template-columns:178px repeat(7,minmax(78px,1fr));gap:4px 4px;min-width:740px;align-items:center;}
  .tt-th{font-size:11px;font-weight:600;color:var(--ink-soft);text-align:center;padding:4px 0;}
  .tt-th.tt-time{text-align:left;}
  .tt-time-cell{display:flex;align-items:center;gap:4px;}
  .tt-time-cell input{height:34px;font-size:11px;padding:0 4px;min-width:0;}
  .tt-dash{color:var(--ink-soft);font-size:12px;}
  .tt-delrow{width:24px;height:24px;flex-shrink:0;border:none;}
  .tt-delrow svg{width:13px;height:13px;}
  .tt-cell input{height:38px;font-size:12px;padding:0 6px;text-align:center;border-color:var(--line-soft);}
  .tt-cell.filled input{background:var(--teal-soft);border-color:var(--teal-soft);font-weight:600;color:var(--teal);}
  /* other income */
  .oi-h,.oi-r{display:grid;grid-template-columns:1.5fr 1fr .7fr 1fr 34px;gap:7px;align-items:center;}
  .oi-h{font-size:11px;color:var(--ink-soft);font-weight:500;padding:0 2px 4px;}
  .oi-h span:nth-child(4){text-align:right;}
  .oi-r{margin-bottom:7px;}
  .oi-r input{height:36px;font-size:13px;padding:0 8px;}
  .oi-amt{font-size:13px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums;color:var(--teal);}

  /* calendar */
  .cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--ink-soft);padding-bottom:4px;}
  .cal-cell{aspect-ratio:1;border:1px solid var(--line-soft);border-radius:9px;padding:5px 6px;position:relative;display:flex;flex-direction:column;min-height:44px;}
  .cal-cell.empty{border:none;}
  .cal-cell.has{cursor:pointer;border-color:var(--line);background:var(--canvas);}
  .cal-cell.has:hover{border-color:var(--teal);}
  .cal-num{font-size:12px;font-weight:600;color:var(--ink);}
  .cal-dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto;}
  .cal-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;}
  .cal-dot.late{background:var(--rose);}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,32,42,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--paper);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:440px;padding:20px;max-height:85vh;overflow:auto;}
  .modal-head{margin-bottom:14px;}
  .day-item{padding:14px;border:1px solid var(--line-soft);border-radius:11px;margin-bottom:12px;}
</style>

function pit(taxable){
  if(taxable<=0) return 0;
  let tax=0, prev=0;
  for(const [cap,rate] of RATES.brackets){
    if(taxable>prev){ tax += (Math.min(taxable,cap)-prev)*rate; prev=cap; } else break;
  }
  return tax;
}

/* ---------- calendar helpers ---------- */
const DOW_LABELS = { en:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], vi:["T2","T3","T4","T5","T6","T7","CN"] };
const MONTH_LABELS = {
  en:["January","February","March","April","May","June","July","August","September","October","November","December"],
  vi:["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"]
};
let calState = { year:2026, month:5 };
function minutesBetween(start,end){
  const [sh,sm]=String(start).split(":").map(Number);
  const [eh,em]=String(end).split(":").map(Number);
  return Math.max(0,(eh*60+em)-(sh*60+sm));
}
const pad2 = n => String(n).padStart(2,"0");
const dKey = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;
function monthOccurrences(tch, year, month){
  const occ=[]; const days=new Date(year,month+1,0).getDate();
  const rowById = {};
  (tch.timeRows||[]).forEach(r=> rowById[r.id]=r);
  (tch.weekly||[]).forEach(slot=>{
    const row = slot.rowId ? rowById[slot.rowId] : null;
    const start = row ? row.start : slot.start;
    const end = row ? row.end : slot.end;
    for(let d=1; d<=days; d++){
      let dow=new Date(year,month,d).getDay(); dow=dow===0?7:dow;
      if(dow===slot.dow){
        const key=dKey(year,month,d)+"_"+slot.id;
        const ded=(tch.deductions&&tch.deductions[key])||null;
        const sched=minutesBetween(start,end);
        occ.push({date:d,key,slot:{...slot,start,end},sched,ded,worked:Math.max(0,sched-(ded?ded.mins:0))});
      }
    }
  });
  return occ;
}

/* ---------- core calculation (from monthly calendar) ---------- */
function calc(tch){
  const vndRate = tch.cur==="usd" ? tch.rate*tch.fx : tch.rate;
  const perMin = vndRate/60;
  const tg = tch.toggles;
  const occ = monthOccurrences(tch, calState.year, calState.month);

  let regPay=0, latePay=0, premium=0, flatHoliday=0;
  occ.forEach(o=>{
    const m = o.slot.mult||1;
    const workedBase = o.worked*perMin;
    const fullBase = o.sched*perMin;
    latePay += (o.ded?o.ded.mins:0)*perMin;
    if(m<=1){ regPay += workedBase; }
    else if(tg.split){ regPay += workedBase; premium += workedBase*(m-1); }
    else { flatHoliday += workedBase*m; }
  });

  const teachingTaxable = regPay + flatHoliday;
  const allowance = +tch.allowance||0;
  const otherTotal = (tch.otherIncome||[]).reduce((a,o)=>a+((+o.rate||0)*(+o.hours||0)),0);

  // overtime: normal-rate portion is taxable, premium above normal is exempt
  let otNormal=0, otPremium=0;
  (tch.overtime||[]).forEach(o=>{
    const otRateVnd = tch.cur==="usd" ? (+o.rate||0)*tch.fx : (+o.rate||0);
    const hrs = +o.hours||0;
    const totalOt = otRateVnd*hrs;
    const normalPortion = Math.min(otRateVnd, vndRate)*hrs; // capped at normal rate
    const premiumPortion = Math.max(0, totalOt - normalPortion);
    otNormal += normalPortion;
    otPremium += premiumPortion;
  });

  const taxableBase = teachingTaxable + allowance + otherTotal + otNormal;
  const premiumTotal = premium + otPremium;
  const gross = taxableBase + premiumTotal;

  let insSalary = (tch.insBase && tch.insBase>0) ? tch.insBase : taxableBase;
  const siBase = tg.cap ? Math.min(insSalary, RATES.capSIHI) : insSalary;
  const uiBase = tg.cap ? Math.min(insSalary, RATES.capUI) : insSalary;
  const siAmt = tg.si ? siBase*RATES.si : 0;
  const hiAmt = tg.hi ? siBase*RATES.hi : 0;
  const uiAmt = tg.ui ? uiBase*RATES.ui : 0;
  const insTotal = siAmt+hiAmt+uiAmt;

  const familyDeduction = RATES.personal + tch.deps*RATES.dependent;
  let taxableIncome, pitDue;
  if(tch.type==="non"){ taxableIncome = taxableBase; pitDue = taxableBase*RATES.nonResident; }
  else { taxableIncome = Math.max(0, taxableBase - insTotal - familyDeduction); pitDue = pit(taxableIncome); }

  const net = gross - insTotal - pitDue;
  return { vndRate, perMin, regPay:teachingTaxable, latePay, premium:premiumTotal, gross, otherTotal,
    otNormal, otPremium, classPremium:premium,
    siAmt, hiAmt, uiAmt, insTotal, insSalary, familyDeduction, taxableIncome,
    pitDue, net, allowance };
}

  hc.appendChild(toggle("split", t("breakpremium"), tch.toggles.split, tch));
  hc.insertAdjacentHTML("beforeend", `<div class="hint">${t("premiumhint")}</div>`);
  hc.appendChild(toggle("cap", t("applycaps"), tch.toggles.cap, tch));
  hc.insertAdjacentHTML("beforeend", `<div class="hint">${t("capshint")}</div>`);
  opts.appendChild(hc);
  frag.appendChild(opts);

  // breakdown
  const bd = el("div",{class:"card card-pad",style:"margin-top:18px;",id:"breakdown"});
  frag.appendChild(bd);
  renderBreakdown(bd, tch);

  // actions
  const actions = el("div",{class:"btn-row"});
  const slipBtn = el("button",{class:"btn btn-primary"}, icon.doc+t("viewpayslip"));
  slipBtn.onclick = ()=>{ readDetail(tch); view.screen="payslip"; render(); };
  actions.appendChild(slipBtn);
  frag.appendChild(actions);

  // wire live inputs
  setTimeout(()=>{
    ["d-name","d-empid","d-type","d-cur","d-rate","d-fx","d-deps","d-mst","d-allow","d-allowname","d-insbase"].forEach(id=>{
      const e=document.getElementById(id); if(!e) return;
      e.addEventListener("input", ()=>{ readDetail(tch);
        if(id==="d-cur"){ render(); }
        else { renderBreakdown(document.getElementById("breakdown"), tch); refreshTopRate(tch); }
      });
      e.addEventListener("change", ()=>{ readDetail(tch); render(); });
    });
  },0);

  return frag;
}

/* ---- timetable grid: explicit time rows × Mon..Sun ---- */
function ensureTimeRows(tch){
  // migrate: if no timeRows yet, derive from existing weekly slots
  if(!tch.timeRows){
    const map = {};
    (tch.weekly||[]).forEach(s=>{
      const k = s.start+"-"+s.end;
      if(!map[k]){ map[k] = {id:"r"+Object.keys(map).length, start:s.start, end:s.end}; }
      s.rowId = map[k].id;
    });
    tch.timeRows = Object.values(map).sort((a,b)=> a.start.localeCompare(b.start));
    if(!tch.timeRows.length) tch.timeRows = [{id:"r0",start:"18:00",end:"19:30"}];
  }
  return tch.timeRows;
}
function renderWeeklyRows(wrap, tch){
  wrap.innerHTML="";
  tch.weekly = tch.weekly || [];
  const rows = ensureTimeRows(tch);
  const days = DOW_LABELS[lang];

  const grid = el("div",{class:"tt"});
  let html = `<div class="tt-th tt-time">${t("starttime")}/${t("endtime")}</div>`;
  days.forEach(d=> html += `<div class="tt-th">${d}</div>`);
  grid.innerHTML = html;

  rows.forEach((r)=>{
    const timeCell = el("div",{class:"tt-time-cell"});
    timeCell.innerHTML = `<input type="time" value="${r.start}" data-rowid="${r.id}" data-tf="start"><span class="tt-dash">–</span><input type="time" value="${r.end}" data-rowid="${r.id}" data-tf="end"><button class="tt-delrow iconbtn" data-delrow="${r.id}" title="remove row">${icon.x}</button>`;
    grid.appendChild(timeCell);
    DOWSEL.forEach(dow=>{
      const slot = tch.weekly.find(s=> s.rowId===r.id && s.dow===dow);
      const cell = el("div",{class:"tt-cell"+(slot?" filled":"")});
      cell.innerHTML = `<input value="${slot?esc(slot.label):""}" placeholder="–" data-rowid="${r.id}" data-dow="${dow}">`;
      grid.appendChild(cell);
    });
  });
  wrap.appendChild(grid);

  const addRow = el("button",{class:"add-link",style:"margin-top:10px;"}, icon.plus+t("addslot"));
  addRow.onclick = ()=>{
    const last = rows[rows.length-1];
    tch.timeRows.push({id:"r"+Date.now(), start:last?last.end:"08:00", end:"09:00"});
    renderWeeklyRows(wrap, tch);
  };
  wrap.appendChild(addRow);

  // edit a row's time
  wrap.querySelectorAll("input[data-tf]").forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const rid=inp.dataset.rowid, f=inp.dataset.tf;
      const row = tch.timeRows.find(r=>r.id===rid); if(row) row[f]=inp.value;
      renderBreakdown(document.getElementById("breakdown"), tch);
      renderCalendar(document.getElementById("calwrap"), tch);
    });
  });
  // delete a row
  wrap.querySelectorAll("button[data-delrow]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const rid=b.dataset.delrow;
      tch.timeRows = tch.timeRows.filter(r=>r.id!==rid);
      tch.weekly = tch.weekly.filter(s=> s.rowId!==rid);
      if(!tch.timeRows.length) tch.timeRows=[{id:"r0",start:"18:00",end:"19:30"}];
      renderWeeklyRows(wrap, tch);
      renderBreakdown(document.getElementById("breakdown"), tch);
      renderCalendar(document.getElementById("calwrap"), tch);
    });
  });
  // edit a class cell
  wrap.querySelectorAll("input[data-dow]").forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const rid=inp.dataset.rowid, dow=+inp.dataset.dow, val=inp.value.trim();
      const row = tch.timeRows.find(r=>r.id===rid);
      let slot = tch.weekly.find(s=> s.rowId===rid && s.dow===dow);
      if(val){
        if(slot) slot.label=val;
        else tch.weekly.push({id:"s"+Date.now()+dow, label:val, dow, rowId:rid, start:row.start, end:row.end, mult:1});
      } else if(slot){
        tch.weekly = tch.weekly.filter(s=> s!==slot);
      }
      renderWeeklyRows(wrap, tch);
      renderBreakdown(document.getElementById("breakdown"), tch);
      renderCalendar(document.getElementById("calwrap"), tch);
    });
  });
}

function renderCalendar(wrap, tch){
  wrap.innerHTML="";
  const {year,month}=calState;
  // header with nav
  const nav = el("div",{class:"cal-nav"});
  const prev = el("button",{class:"iconbtn"}, icon.back);
  const next = el("button",{class:"iconbtn"}, icon.chevron);
  prev.onclick=()=>{ calState.month--; if(calState.month<0){calState.month=11;calState.year--;} render(); };
  next.onclick=()=>{ calState.month++; if(calState.month>11){calState.month=0;calState.year++;} render(); };
  const occ = monthOccurrences(tch, year, month);
  const totalSched = occ.reduce((a,o)=>a+o.sched,0);
  const totalWorked = occ.reduce((a,o)=>a+o.worked,0);
  nav.appendChild(prev);
  nav.appendChild(el("div",{style:"flex:1;text-align:center;"},`<div style="font-weight:600;">${MONTH_LABELS[lang][month]} ${year}</div><div class="muted">${t("workedmin")} ${Math.round(totalWorked/60*10)/10}h / ${Math.round(totalSched/60*10)/10}h</div>`));
  nav.appendChild(next);
  wrap.appendChild(nav);

  // weekday header
  const grid = el("div",{class:"cal-grid"});
  DOW_LABELS[lang].forEach(d=> grid.appendChild(el("div",{class:"cal-dow"},d)));
  // leading blanks
  let firstDow = new Date(year,month,1).getDay(); firstDow=firstDow===0?7:firstDow;
  for(let i=1;i<firstDow;i++) grid.appendChild(el("div",{class:"cal-cell empty"}));
  const days=new Date(year,month+1,0).getDate();
  for(let d=1; d<=days; d++){
    const dayOcc = occ.filter(o=>o.date===d);
    const cell = el("div",{class:"cal-cell"+(dayOcc.length?" has":"")});
    let dots="";
    dayOcc.forEach(o=>{ dots += `<span class="cal-dot${o.ded?" late":""}" title="${esc(o.slot.label)}"></span>`; });
    cell.innerHTML = `<span class="cal-num">${d}</span><div class="cal-dots">${dots}</div>`;
    if(dayOcc.length){ cell.onclick=()=>openDay(tch, year, month, d); }
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);

  // legend
  wrap.appendChild(el("div",{class:"muted",style:"margin-top:10px;display:flex;gap:16px;align-items:center;"},
    `<span style="display:inline-flex;align-items:center;gap:6px;"><span class="cal-dot"></span> ${t("class")}</span><span style="display:inline-flex;align-items:center;gap:6px;"><span class="cal-dot late"></span> ${t("deducted")}</span>`));
}

function openDay(tch, year, month, d){
  const occ = monthOccurrences(tch, year, month).filter(o=>o.date===d);
  const modal = el("div",{class:"modal-bg"});
  const box = el("div",{class:"modal"});
  const dateStr = `${DOW_LABELS[lang][(new Date(year,month,d).getDay()||7)-1]} ${d} ${MONTH_LABELS[lang][month]}`;
  box.innerHTML = `<div class="modal-head"><span style="font-weight:600;">${dateStr}</span></div>`;
  occ.forEach(o=>{
    const ded = o.ded || {mins:0,note:""};
    const item = el("div",{class:"day-item"});
    item.innerHTML = `<div style="font-weight:600;font-size:14px;">${esc(o.slot.label)}</div>
      <div class="muted" style="margin-bottom:8px;">${o.slot.start}–${o.slot.end} · ${o.sched} ${lang==="vi"?"phút":"min"}</div>`;
    const row = el("div",{class:"grid cols2",style:"gap:10px;"});
    row.appendChild(field(t("deductmins"), `<input type="number" min="0" value="${ded.mins}" id="ded-${o.slot.id}">`));
    row.appendChild(field(t("reasonopt"), `<input value="${esc(ded.note)}" id="note-${o.slot.id}" placeholder="${t("reasonopt")}">`));
    item.appendChild(row);
    box.appendChild(item);
  });
  const actions = el("div",{class:"btn-row",style:"margin-top:8px;"});
  const save = el("button",{class:"btn btn-primary"}, t("save"));
  save.onclick = ()=>{
    occ.forEach(o=>{
      const mins=+document.getElementById("ded-"+o.slot.id).value||0;
      const note=document.getElementById("note-"+o.slot.id).value;
      tch.deductions = tch.deductions||{};
      if(mins>0){ tch.deductions[o.key]={mins,note}; }
      else { delete tch.deductions[o.key]; }
    });
    document.body.removeChild(modal);
    renderBreakdown(document.getElementById("breakdown"), tch);
    renderCalendar(document.getElementById("calwrap"), tch);
  };
  const cancel = el("button",{class:"btn btn-ghost"}, lang==="vi"?"Đóng":"Close");
  cancel.onclick=()=> document.body.removeChild(modal);
  actions.appendChild(save); actions.appendChild(cancel);
  box.appendChild(actions);
  modal.appendChild(box);
  modal.onclick=(e)=>{ if(e.target===modal) document.body.removeChild(modal); };
  document.body.appendChild(modal);
}


function readDetail(tch){
  const g=id=>document.getElementById(id);
  if(!g("d-name")) return;
  tch.name=g("d-name").value; tch.empId=g("d-empid").value;
  tch.type=g("d-type").value; tch.cur=g("d-cur").value;
  tch.rate=+g("d-rate").value||0; if(g("d-fx")) tch.fx=+g("d-fx").value||0;
  tch.deps=Math.max(0,+g("d-deps").value||0); tch.mst=g("d-mst").value;
  tch.allowance=+g("d-allow").value||0; tch.insBase=+g("d-insbase").value||0;
  if(g("d-allowname")) tch.allowanceName=g("d-allowname").value;
}

function renderBreakdown(box, tch){
  const r = calc(tch);
  const rows = [];
  rows.push(["lab", t("hourlyrate"), vnd(r.vndRate)]);
  rows.push(["lab", t("regularpay"), vnd(r.regPay)]);
  if(r.allowance>0) rows.push(["lab", (tch.allowanceName||t("allowance")), vnd(r.allowance)]);
  (tch.otherIncome||[]).forEach(o=>{ const amt=(+o.rate||0)*(+o.hours||0); if(amt>0) rows.push(["lab", o.name||t("otherincome"), vnd(amt)]); });
  if(r.otNormal>0) rows.push(["lab", t("otnormalpart"), vnd(r.otNormal)]);
  if(r.latePay>0) rows.push(["neg", t("latededuct"), "−"+vnd(r.latePay)]);
  if(r.classPremium>0) rows.push(["pos", t("holidaypremium"), vnd(r.classPremium)]);
  if(r.otPremium>0) rows.push(["pos", t("otpremiumpart"), vnd(r.otPremium)]);
  let html = `<div class="bd-row"><span class="lab">${t("gross")}</span><span class="val">${vnd(r.gross)}</span></div>`;
  let pre = "";
  rows.forEach(([cls,l,v])=>{
    pre += `<div class="bd-row ${cls==='neg'?'neg':cls==='pos'?'pos':''}"><span class="lab">${l}</span><span class="val">${v}</span></div>`;
  });
  let mid = "";
  if(tch.toggles.si) mid += `<div class="bd-row neg"><span class="lab">− ${t("si")}</span><span class="val">−${vnd(r.siAmt)}</span></div>`;
  if(tch.toggles.hi) mid += `<div class="bd-row neg"><span class="lab">− ${t("hi")}</span><span class="val">−${vnd(r.hiAmt)}</span></div>`;
  if(tch.toggles.ui) mid += `<div class="bd-row neg"><span class="lab">− ${t("ui")}</span><span class="val">−${vnd(r.uiAmt)}</span></div>`;
  mid += `<div class="bd-row neg"><span class="lab">− ${t("pit")}</span><span class="val">−${vnd(r.pitDue)}</span></div>`;
  const net = `<div class="bd-total"><span class="lab">${t("net")}</span><span class="val">${vnd(r.net)}</span></div>`;
  box.innerHTML = pre + html + mid + net;
}

    <div class="slip-sign">
      <div class="sign-box"><div class="line"><span class="role">${L.preparer}</span><br><span class="sub">${L.signdate}</span></div></div>
      <div class="sign-box"><div class="line"><span class="role">${L.receiver}</span><br><span class="sub">${L.signdate}</span></div></div>
    </div>
    <div class="slip-foot">${L.slipfoot}</div>
  </div>`;
}

function payslipScreen(){
  const tch = teachers.find(x=>x.id===view.teacherId);
  const frag = document.createDocumentFragment();
  const back = el("button",{class:"back"}, icon.back+t("back"));
  back.onclick = ()=>{ view.screen="detail"; render(); };
  frag.appendChild(back);

  const holder = el("div",{});
  holder.innerHTML = buildSlipHTML(tch,false);
  frag.appendChild(holder);

  const actions = el("div",{class:"btn-row"});
  const pdf = el("button",{class:"btn btn-primary"}, icon.file+t("exportpdf"));
  pdf.onclick = ()=> exportPDF(tch);
  const xls = el("button",{class:"btn btn-ghost"}, icon.sheet+t("exportexcel"));
  xls.onclick = ()=> exportCSV(tch);
  actions.appendChild(pdf); actions.appendChild(xls);
  frag.appendChild(actions);
  return frag;
}

/* ---------- exports ---------- */
function exportPDF(tch){
  const css = document.querySelector("style").innerHTML;
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${t("payslip")} · ${tch.name}</title>
    <style>${css} body{background:#fff;padding:24px;} .slip{box-shadow:none;max-width:720px;margin:0 auto;}</style></head>
    <body>${buildSlipHTML(tch,true)}</body></html>`;
  const w = window.open("","_blank");
  if(w){ w.document.write(html); w.document.close(); setTimeout(()=>w.print(),350); }
}
function exportCSV(tch){
  const r = calc(tch); const L=I18N[lang];
  const rows = [
    [L.payslip, tch.name],
    [L.employeeid, tch.empId||""],
    [L.taxnumber, tch.mst||""],
    [L.period, new Date().toLocaleDateString("en-GB",{month:"2-digit",year:"numeric"})],
    [],
    [L.teachingpay, Math.round(r.regPay)],
    [L.allowance, Math.round(r.allowance)],
    [L.holidaypremium, Math.round(r.premium)],
    [L.totalincome, Math.round(r.gross)],
    ["BHXH (SI 8%)", Math.round(r.siAmt)],
    ["BHYT (HI 1.5%)", Math.round(r.hiAmt)],
    ["BHTN (UI 1%)", Math.round(r.uiAmt)],
    [L.pit, Math.round(r.pitDue)],
    [L.insbaseLabel, Math.round(r.insSalary)],
    [L.taxableincome, Math.round(r.taxableIncome)],
    [L.net, Math.round(r.net)],
  ];
  const csv = "\uFEFF" + rows.map(row=> row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`payslip_${(tch.name||"teacher").replace(/\s+/g,"_")}.csv`; a.click();
}

/* ---------- boot ---------- */
render();

</script>
